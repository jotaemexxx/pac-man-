<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man com Grafos</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient( 0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px );
                pointer-events: none;
                z-index: 999;
            }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 1;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            color: #ffe000;
            text-shadow: 0 0 10px #ffe000, 0 0 30px rgba(255,224,0,0.35);
            letter-spacing: 0.15em;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 95%, 100% {
                opacity: 1;
            }

            96% {
                opacity: 0.85;
            }

            97% {
                opacity: 1;
            }

            98% {
                opacity: 0.7;
            }

            99% {
                opacity: 1;
            }
        }

        .subtitle {
            font-size: 0.4rem;
            color: #00e5ff;
            letter-spacing: 0.3em;
            margin-top: 4px;
            opacity: 0.8;
            text-align: center;
        }

        #score-bar {
            display: flex;
            gap: 40px;
            align-items: center;
            background: #0f0f1a;
            border: 1px solid #1a1a2e;
            padding: 10px 28px;
            border-radius: 4px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .score-label {
            font-size: 0.35rem;
            color: #00e5ff;
            letter-spacing: 0.2em;
        }

        .score-value {
            font-size: 0.9rem;
            color: #ffe000;
            text-shadow: 0 0 12px #ffe000;
            min-width: 60px;
            text-align: center;
        }

        #gameCanvas {
            border: 2px solid #1565c0;
            border-radius: 4px;
            box-shadow: 0 0 0 4px #0d2b55, 0 0 30px rgba(21,101,192,0.4);
        }

        #message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            backdrop-filter: blur(4px);
            z-index: 100;
        }

        #messageText {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            color: #ff3c3c;
            text-shadow: 0 0 20px #ff3c3c;
            text-align: center;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #message button {
            background: transparent;
            border: 2px solid #ffe000;
            color: #ffe000;
            padding: 14px 28px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }

            #message button:hover {
                background: #ffe000;
                color: #0a0a0f;
                box-shadow: 0 0 12px #ffe000;
            }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="title">PAC-MAN</div>
        <div class="subtitle">GRAPH EDITION · ASP.NET · SIGNALR</div>

        <div id="score-bar">
            <div class="score-item">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">CONTROLES</span>
                <span class="score-value" style="font-size:0.5rem;">↑ ↓ ← →</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="message" class="hidden">
            <p id="messageText"></p>
            <button onclick="restartGame()">▶ JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script src="js/signalr.js"></script>
    <script src="js/connection.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
